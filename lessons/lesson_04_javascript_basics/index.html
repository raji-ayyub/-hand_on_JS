<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson 04 - JavaScript Basics</title>
  <style>
    body {
      margin: 0;
      padding: 2rem;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #ffffff 100%);
      color: #0f172a;
    }

    .page {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .panel {
      padding: 1.5rem;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 18px 35px rgba(15, 23, 42, 0.1);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin: 1.25rem 0;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 0.85rem 1rem;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: #ffffff;
    }

    pre {
      min-height: 180px;
      margin: 0;
      padding: 1rem;
      border-radius: 16px;
      background: #eff6ff;
      overflow-x: auto;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <p>Lesson 04</p>
      <h1>JavaScript basics in action</h1>
      <p>
        Click the buttons to see variables, operators, template literals, and
        conditionals update the output below.
      </p>

      <div class="button-row">
        <button id="summaryButton" type="button">Show learner summary</button>
        <button id="scoreButton" type="button">Show score breakdown</button>
      </div>

      <pre id="output"></pre>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
